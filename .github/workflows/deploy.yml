name: Deploy to Scaleway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCALEWAY_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCALEWAY_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCALEWAY_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCALEWAY_PROJECT_ID }}
      SCW_DEFAULT_REGION: fr-par

    steps:
      - uses: actions/checkout@v6

      - name: Install Scaleway CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo scaleway/scaleway-cli --pattern '*linux_amd64' --dir /tmp/scw
          install /tmp/scw/*linux_amd64 /usr/local/bin/scw

      - name: Create namespace (idempotent)
        id: namespace
        run: |
          NS_ID=$(scw function namespace list region=$SCW_DEFAULT_REGION -o json | jq -r '.[] | select(.name=="social-screenshots") | .id')
          if [ -z "$NS_ID" ]; then
            NS_ID=$(scw function namespace create region=$SCW_DEFAULT_REGION name=social-screenshots -o json | jq -r '.id')
            echo "Created namespace $NS_ID"
            scw function namespace wait $NS_ID region=$SCW_DEFAULT_REGION
          fi
          echo "ns_id=$NS_ID" >> "$GITHUB_OUTPUT"

      - name: Package function
        run: |
          WORKDIR=$(mktemp -d)
          cp scaleway/handler.py "$WORKDIR/"
          cp screenshot_post.py "$WORKDIR/"
          cp -r fonts "$WORKDIR/"
          cp 454286ac07a6f6e6.jpeg "$WORKDIR/"
          docker run --rm -v "$WORKDIR":/home/app/function \
            --workdir /home/app/function \
            rg.fr-par.scw.cloud/scwfunctionsruntimes-public/python-dep:3.12 \
            pip3 install --upgrade requests beautifulsoup4 pillow \
            --no-cache-dir --target ./package
          cd "$WORKDIR" && zip -r /tmp/function.zip handler.py screenshot_post.py fonts/ 454286ac07a6f6e6.jpeg package/
          cp /tmp/function.zip "$GITHUB_WORKSPACE/function.zip"

      - name: Create or update function
        id: function
        run: |
          NS_ID=${{ steps.namespace.outputs.ns_id }}
          FN_ID=$(scw function function list namespace-id=$NS_ID region=$SCW_DEFAULT_REGION -o json | jq -r '.[] | select(.name=="screenshot") | .id')
          if [ -z "$FN_ID" ]; then
            FN_ID=$(scw function function create \
              namespace-id=$NS_ID \
              region=$SCW_DEFAULT_REGION \
              name=screenshot \
              runtime=python312 \
              handler=handler.handle \
              min-scale=0 \
              max-scale=5 \
              memory-limit=512 \
              timeout=30s \
              privacy=public \
              http-option=enabled \
              -o json | jq -r '.id')
            echo "Created function $FN_ID"
          fi
          echo "fn_id=$FN_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy function
        run: |
          NS_ID=${{ steps.namespace.outputs.ns_id }}
          scw function deploy namespace-id=$NS_ID name=screenshot runtime=python312 region=$SCW_DEFAULT_REGION zip-file=function.zip

      - name: Print endpoint URL
        run: |
          FN_ID=${{ steps.function.outputs.fn_id }}
          scw function function get $FN_ID region=$SCW_DEFAULT_REGION -o json | jq -r '.domain_name' | xargs -I{} echo "Endpoint: https://{}"
