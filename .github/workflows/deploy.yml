name: Deploy to Scaleway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCALEWAY_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCALEWAY_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCALEWAY_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCALEWAY_PROJECT_ID }}
      SCW_REGION: fr-par

    steps:
      - uses: actions/checkout@v5

      - name: Install Scaleway CLI
        run: |
          SCW_VERSION=$(curl -fsSL https://api.github.com/repos/scaleway/scaleway-cli/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -fsSL "https://github.com/scaleway/scaleway-cli/releases/download/v${SCW_VERSION}/scaleway-cli_${SCW_VERSION}_linux_amd64" -o /usr/local/bin/scw
          chmod +x /usr/local/bin/scw

      - name: Create namespace (idempotent)
        id: namespace
        run: |
          # List existing namespaces, create if missing
          NS_ID=$(scw function namespace list region=$SCW_REGION -o json | jq -r '.[] | select(.name=="social-screenshots") | .id')
          if [ -z "$NS_ID" ]; then
            NS_ID=$(scw function namespace create region=$SCW_REGION name=social-screenshots -o json | jq -r '.id')
            echo "Created namespace $NS_ID"
            # Wait for namespace to be ready
            scw function namespace wait $NS_ID region=$SCW_REGION
          fi
          echo "ns_id=$NS_ID" >> "$GITHUB_OUTPUT"

      - name: Package function
        run: |
          zip -r function.zip handler.py screenshot_post.py requirements.txt fonts/ 454286ac07a6f6e6.jpeg

      - name: Create or update function
        id: function
        run: |
          NS_ID=${{ steps.namespace.outputs.ns_id }}
          FN_ID=$(scw function function list namespace-id=$NS_ID region=$SCW_REGION -o json | jq -r '.[] | select(.name=="screenshot") | .id')
          if [ -z "$FN_ID" ]; then
            FN_ID=$(scw function function create \
              namespace-id=$NS_ID \
              region=$SCW_REGION \
              name=screenshot \
              runtime=python311 \
              handler=handler.handle \
              min-scale=0 \
              max-scale=5 \
              memory-limit=512 \
              timeout=30s \
              privacy=public \
              http-option=enabled \
              -o json | jq -r '.id')
            echo "Created function $FN_ID"
          fi
          echo "fn_id=$FN_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy function
        run: |
          FN_ID=${{ steps.function.outputs.fn_id }}
          scw function deploy $FN_ID region=$SCW_REGION zip-file=function.zip

      - name: Print endpoint URL
        run: |
          FN_ID=${{ steps.function.outputs.fn_id }}
          scw function function get $FN_ID region=$SCW_REGION -o json | jq -r '.domain_name' | xargs -I{} echo "Endpoint: https://{}"
